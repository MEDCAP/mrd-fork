{% set version_match = load_file_regex(load_file="../../VERSION", regex_pattern="([0-9]+\\.[0-9]+\\.[0-9]+)", from_recipe_dir=True) %}
{% set version = version_match[1] %}

package:
  name: mrd-python
  version: {{ version }}

source:
  path: ../

build:
  noarch: python

requirements:
  build:
    - python
    - pip
    - setuptools >=65.5.0
  run:
    - python
    - h5py >=3.15.1
    - ismrmrd-python >=1.15.0
    - numpy >=1.22.0
    - pillow >=9.2.0

test:
  imports:
    - mrd
    - mrd.tools.phantom
    - mrd.tools.stream_recon
    - mrd.tools.export_png_images
    - mrd.tools.ismrmrd_to_mrd
    - mrd.tools.mrd_to_ismrmrd
    - mrd.tools.fastmri_to_mrd

about:
  home: https://ismrmrd.github.io/mrd
  license: MIT
  summary: 'Python SDK for the ISMRM Raw Data Format (MRD)'
  description: |
    Python interface and utilities for working with ISMRM Raw Data.
  dev_url: https://github.com/ismrmrd/mrd
  doc_url: https://ismrmrd.github.io/mrd
  doc_source_url: https://github.com/ismrmrd/mrd/blob/main/README.md
