name: Build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Increase this to manually reset the conda environment cache
  CONDA_CACHE_NUMBER: 0
  YARDL_VERSION: 0.6.7

defaults:
  run:
    # See https://github.com/marketplace/actions/setup-miniconda#important
    shell: bash -el {0}

jobs:
  build:
    name: Build and Test C++ and Python SDKs (${{ matrix.runner }})
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm, macos-26]
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Configure Build Environment
      uses: ./.github/actions/configure-mrd-build-environment

    - name: Build and Test with C++17
      run: just cpp_version=17 validate-with-no-changes

    - name: Build and Test with C++20
      run: just cpp_version=20 validate-with-no-changes

    - name: Generate CMake FetchContent source archive
      if: matrix.runner == 'ubuntu-24.04'
      run: just build-cmake-fetch-src

    - name: Store CMake FetchContent source archive
      if: matrix.runner == 'ubuntu-24.04'
      uses: actions/upload-artifact@v7
      with:
        name: mrd-cmake-src
        path: mrd-cmake-src*.tar.gz
        overwrite: true

  build-matlab:
    name: Build and Test MATLAB SDK
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Configure Build Environment
      uses: ./.github/actions/configure-mrd-build-environment

    - name: Set up MATLAB
      uses: matlab-actions/setup-matlab@v3
      with:
        release: R2023b
        cache: true

    # Workaround to running `matlab -batch` from within justfile and Python
    # See: https://github.com/matlab-actions/run-command/issues/53
    - name: Get run-matlab-command
      shell: bash
      run: |
        wget -O /usr/local/bin/run-matlab-command https://ssd.mathworks.com/supportfiles/ci/run-matlab-command/v2/glnxa64/run-matlab-command
        chmod +x /usr/local/bin/run-matlab-command

    - name: Build and Test
      run: just matlab=enabled test

    - name: Package MATLAB toolbox
      run: just build-matlab-toolbox

    - name: Store MATLAB Toolbox
      uses: actions/upload-artifact@v7
      with:
        name: matlab-toolbox
        path: matlab/release/mrd*.mltbx
        overwrite: true

  docker:
    name: Build and Test Docker images
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up just command runner
      uses: extractions/setup-just@v4
    - name: Build and test Docker images
      run: just build-docker-images && just test-docker-images

  publishDocs:
    name: Publish Documentation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'ismrmrd/mrd'
    needs: [build, build-matlab, docker]
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    # Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
    # However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
    concurrency:
      group: "pages"
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up just command runner
        uses: extractions/setup-just@v4

      - name: Build static page
        run: just build-docs

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs/.vitepress/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    name: Publish Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: [build, build-matlab, docker]
    runs-on: ubuntu-24.04
    environment:
      name: github-release
      url: https://github.com/ismrmrd/mrd/releases
    permissions:
      contents: write
      packages: write

    steps:
    - name: Retrieve MATLAB Toolbox
      uses: actions/download-artifact@v8
      with:
        name: matlab-toolbox

    - name: Retrieve CMake FetchContent source archive
      uses: actions/download-artifact@v8
      with:
        name: mrd-cmake-src

    - name: Generate Checksums
      run: |
        sha256sum mrd*.mltbx > sha256-checksums.txt
        sha256sum mrd-cmake-src*.tar.gz >> sha256-checksums.txt

    - name: Publish Artifacts
      uses: softprops/action-gh-release@v3
      with:
        files: |
          sha256-checksums.txt
          mrd-cmake-src*.tar.gz
          mrd*.mltbx
        fail_on_unmatched_files: true
        body: |
          See also:
          - [MRD Conda C++ SDK](https://anaconda.org/ismrmrd/mrd)
          - [MRD Conda Python SDK](https://anaconda.org/ismrmrd/mrd-python)
          - [PyPi](https://pypi.org/project/mrd-python/)
          - [Docker image](https://ghcr.io/ismrmrd/mrd-tools)
        append_body: true

    - name: Log into ghcr.io
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up just command runner
      uses: extractions/setup-just@v4
    - name: Push Docker images
      run: just build-docker-images --tag "${GITHUB_REF_NAME}" --push
